<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Face Test & Lotto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Dark Mode</button>
    </div>

    <div class="container">
        <h1>AI 동물상 테스트</h1>
        <p>강아지상? 고양이상? AI가 분석해드립니다!</p>
        <button type="button" id="start-webcam-btn" onclick="initAnimalTest()">카메라 시작하기</button>
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers">
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container contact-section">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mvzdzygg" method="POST" id="contact-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="성함/업체명" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="이메일 주소" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
            </div>
            <button type="submit" id="submit-btn">문의하기</button>
        </form>
    </div>

    <div class="container comment-section">
        <div id="disqus_thread"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuilder-shigdhky5z.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
